name: Tests

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck install.sh uninstall.sh

  test-linux:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Ubuntu
            dockerfile: docker/ubuntu.Dockerfile
          - name: Fedora
            dockerfile: docker/fedora.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -f ${{ matrix.dockerfile }} -t dotfiles-test .
      - name: Test
        run: docker run --rm dotfiles-test

  e2e:
    name: E2E ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            dockerfile: docker/ubuntu-e2e.Dockerfile
          - name: Fedora
            dockerfile: docker/fedora-e2e.Dockerfile
          - name: Arch
            dockerfile: docker/arch-e2e.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Build and run install.sh
        run: docker build -f ${{ matrix.dockerfile }} -t dotfiles-e2e .

  test-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: brew install bats-core
      - name: Test
        run: bats tests/

  e2e-macos:
    name: E2E macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run install.sh
        run: ./install.sh --name "Test User" --email "test@example.com"
      - name: Verify packages on PATH
        run: command -v tmux && command -v nvim && command -v neomutt && command -v zsh
      - name: Verify dotfile symlinks
        run: |
          test -L "$HOME/.tmux.conf"
          test -L "$HOME/.vimrc"
          test -L "$HOME/.zshrc"
          test -L "$HOME/.config/nvim"
          test -L "$HOME/.slconfig"
      - name: Verify nvim plugins installed
        run: test -d "$HOME/.local/share/nvim/plugged"
